# Replace 192.168.1.50 with the reserved LAN address of the ESP32.
# This listener is localhost-only: Tailscale Serve is the public-facing TLS
# endpoint inside your private tailnet.
server {
    listen 127.0.0.1:8080;
    server_name _;

    location = /stream {
        proxy_pass http://192.168.1.50:81/stream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://192.168.1.50:80;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

